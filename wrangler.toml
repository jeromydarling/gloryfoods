# Cloudflare Worker (static assets + API) for Vibes Cuisine and Bakery
# (codename Glory Foods).
#
# The Astro site builds to ./dist and is served by the [assets] binding. The
# Worker (worker/index.ts) handles the /api/* routes and falls back to assets.
# This is deployed by Cloudflare's Git integration (Workers Builds) on push:
# `wrangler deploy` runs the [build] command first, then ships the Worker.
#
# Secrets (STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET) are set with
# `wrangler secret put <NAME>` — never committed.

name = "gloryfoods"
main = "worker/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# Build the static site before deploying (runs under `wrangler deploy`, so both
# CI and Cloudflare's native Git build produce ./dist automatically).
[build]
command = "npm install && npm run build"

# Static assets (the built Astro site). Unmatched paths fall through to the
# Worker; missing pages render the prebuilt 404.
[assets]
directory = "./dist"
binding = "ASSETS"
html_handling = "auto-trailing-slash"
not_found_handling = "404-page"

# --- D1: orders, customers, subscriptions, catalog (authoritative pricing) ---
[[d1_databases]]
binding = "DB"
database_name = "glory-foods-db"
database_id = "d371beb3-0460-4d51-a5fa-462ae8637066"

# --- KV: webhook idempotency, rate limiting, newsletter de-duplication ---
[[kv_namespaces]]
binding = "KV"
id = "7b635d3f26c84435a88b86758df00817"

# Non-secret, public-safe vars. Secrets (Stripe keys) are set out-of-band.
[vars]
SITE_URL = "https://gloryfoods.jer-f84.workers.dev"
BRAND_NAME = "Vibes Cuisine and Bakery"
ORDER_CURRENCY = "usd"
