name: CI

# Fast validation on pull requests and feature branches.
# No secrets, no deploy — just proves the site builds and types are clean.

on:
  pull_request:
  push:
    branches-ignore: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type-check
        run: npx astro check
      - name: Build
        run: npm run build
