name: Deploy to Cloudflare Pages

# Auto-deploys the storefront on every push to main (and on demand).
# The GitHub runner is a separate machine, so it authenticates to Cloudflare
# with two repository secrets (set once, Settings → Secrets → Actions):
#   CLOUDFLARE_API_TOKEN   — token with "Cloudflare Pages: Edit" + "D1: Edit"
#   CLOUDFLARE_ACCOUNT_ID  — your account id
#
# Stripe keys are Pages runtime secrets (set via `wrangler pages secret put`)
# and are NOT needed here — they persist on the project across deploys.

on:
  push:
    branches: [main]
  workflow_dispatch: {}
  # The image workflow commits with GITHUB_TOKEN, whose pushes do NOT trigger
  # the `push` event above. Chain off its completion instead so freshly
  # generated Flux photography always gets deployed.
  workflow_run:
    workflows: ["Generate Flux imagery"]
    types: [completed]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skip only when chained off a *failed* image run; always run otherwise.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: production
      url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx astro check

      - name: Build
        run: npm run build

      # D1 schema + catalog are idempotent (IF NOT EXISTS / INSERT OR REPLACE).
      - name: Apply D1 schema
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 execute glory-foods-db --remote --file=./db/schema.sql

      - name: Seed D1 catalog
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 execute glory-foods-db --remote --file=./db/seed.sql

      # `pages deploy` errors if the project doesn't exist yet. Create it on the
      # first run; on later runs this fails harmlessly (continue-on-error).
      - name: Ensure Pages project exists
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create glory-foods --production-branch=main

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=glory-foods --branch=main --commit-dirty=true
